apiVersion: v1
kind: Service
metadata:
  name: frpc-manager
  labels:
    app: frpc-manager
spec:
  type: ClusterIP
  selector:
    app: frpc-manager
  ports:
    - port: 7400
      targetPort: web
      protocol: TCP
      name: web
---
