apiVersion: apps/v1
kind: Deployment
metadata:
  name: frpc-manager
  labels:
    app: frpc-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frpc-manager
  template:
    metadata:
      labels:
        app: frpc-manager
    spec:
      containers:
        - name: frpc-manager
          image: frpc-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7400
              name: web
          env:
            - name: FRPC_WEB_PORT
              value: "7400"
            # - name: FRPC_WEB_USER
            #   valueFrom:
            #     secretKeyRef:
            #       name: frpc-auth
            #       key: username
            # - name: FRPC_WEB_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: frpc-auth
            #       key: password
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: web
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: frpc-manager-data
